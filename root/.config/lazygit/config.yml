gui:
  authorColors:
    'Darian Toledo': 'cyan'
  border: single
  showBottomLine: false
  theme:
    selectedLineBgColor:
      - "#303030"
      - bold
notARepository: 'quit'
customCommands:
  - key: "w"
    command: "git cz"
    description: "commit with commitizen"
    context: "files"
    loadingText: "opening commitizen commit tool"
    output: terminal
